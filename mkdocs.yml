site_name: Gemm
repo_url: https://github.com/Gemm-App/Gemm-Engine
site_description: Open-source framework for multi-brand robot fleet integration

theme:
  name: material
  custom_dir: overrides
  favicon: img/favicon.ico
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Concepts:
    - Adapters: concepts/adapters.md
    - Tasks: concepts/tasks.md
    - Sensors: concepts/sensors.md
  - Guides:
    - Building an adapter: guides/building-an-adapter.md
